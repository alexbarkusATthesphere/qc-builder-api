# Alembic configuration for qc-builder-api
#
# The database URL is NOT set here — it's pulled from app.core.config
# at runtime by env.py so that .env overrides work everywhere (local
# SQLite, VM, production) without touching this file.

[alembic]
# Path to the migration scripts directory (relative to project root)
script_location = app/alembic

# Template used when generating new revision files via:
#   alembic revision --autogenerate -m "description"
# file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(rev)s_%%(slug)s

# Truncate long revision hashes in log output
truncate_slug_length = 40

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(asctime)s | %(levelname)-8s | %(name)s | %(message)s
datefmt = %Y-%m-%d %H:%M:%S